name: Android Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      major_upgrade:
        description: 'Is this a major upgrade?'
        required: false
        default: 'false'
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Increment Version
        run: |
          ./gradlew :app:incrementVersion
          # Note: If this was a major upgrade, we would handle it here or in the gradle task
          # For now, it increments the minor/patch version as per the task logic.

      - name: Build with Gradle
        run: ./gradlew assembleRelease

      - name: Get Version Name
        id: get_version
        run: |
          VERSION_NAME=$(grep 'VERSION_NAME' app/version.properties | cut -d'=' -f2)
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "version=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION_NAME }}
          name: Release ${{ env.VERSION_NAME }}
          draft: false
          prerelease: false
          files: app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version change
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add app/version.properties
          git commit -m "chore: bump version to ${{ env.VERSION_NAME }} [skip ci]"
          git push
