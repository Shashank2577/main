name: Android Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/**'
      - 'README.md'
      - 'LICENSE'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Get current version
        id: version
        run: |
          VERSION_NAME=$(grep 'VERSION_NAME' app/version.properties | cut -d'=' -f2)
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "version=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION_NAME"

      - name: Check if release exists
        id: check_release
        run: |
          if gh release view v${{ env.VERSION_NAME }} &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release v${{ env.VERSION_NAME }} already exists, will update with APK"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Release v${{ env.VERSION_NAME }} does not exist, will create new"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Increment Version (if release doesn't exist)
        if: steps.check_release.outputs.exists == 'false'
        run: |
          ./gradlew :app:incrementVersion
          VERSION_NAME=$(grep 'VERSION_NAME' app/version.properties | cut -d'=' -f2)
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "Incremented to: $VERSION_NAME"

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Create or Update Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION_NAME }}
          name: Release ${{ env.VERSION_NAME }}
          draft: false
          prerelease: false
          files: app/build/outputs/apk/debug/*.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version change (if incremented)
        if: steps.check_release.outputs.exists == 'false'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add app/version.properties
          git commit -m "chore: bump version to ${{ env.VERSION_NAME }} [skip ci]"
          git push
